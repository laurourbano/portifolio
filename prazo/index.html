<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/meufavicon.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Prazos</title>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <input type="date" name="30" id="trinta" class="data">
            <label for="trinta">30</label>
            <p class="prazo"></p>
        </div>
        <div class="wrapper">
            <input type="date" name="60" id="sessenta" class="data">
            <label for="sessenta">60</label>
            <p class="prazo"></p>
        </div>
        <div class="wrapper">
            <input type="date" name="90" id="noventa" class="data">
            <label for="noventa">90</label>
            <p class="prazo"></p>
        </div>
        <div class="wrapper">
            <input type="date" name="120" id="cento-e-vinte" class="data">
            <label for="cento-e-vinte">120</label>
            <p class="prazo"></p>
        </div>
        <div class="wrapper">
            <input type="date" name="160" id="cento-e-sessenta" class="data">
            <label for="cento-e-sessenta">160</label>
            <p class="prazo"></p>
        </div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
