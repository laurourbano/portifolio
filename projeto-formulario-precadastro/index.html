<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Pré-cadastro Inscrição Profissional</title>
</head>

<body>
    <h3>Clique em cada botão para anexar seus documentos separadamente:</h3>
    <div><p id="obrigatorios">campos obrigatórios</p></div>
    <form action="submit">
        <section>
            <fieldset>
                <div>
                    <label for="nome" title="nome">Nome:<input type="text" name="nome" id="nome" title="nome" required></label>
                </div>
                <div>
                    <legend>Sexo:</legend>
                    <label for="sexo">
                        <input type="radio" name="sexo" id="sexo" title="feminino" checked required>
                        feminino
                        <input type="radio" name="sexo" id="sexo" title="masculino" required>
                        masculino
                    </label>
                </div>
                <div>
                    <label for="rgrne">
                        RG ou RNE: 
                        <input type="file" name="RG/RNE" id="rgrne" title="RG/RNE" required>
                    </label>
                </div>
                <div>
                    <label for="cpf">
                        CPF: 
                        <input type="file" name="CPF" id="cpf" title="CPF" required>
                    </label>
                </div>
                <div>
                    <label for="titulo-eleitor">
                        Título de Eleitor:
                        <input type="file" name="titulo-eleitor" id="titulo-eleitor" title="Título de Eleitor" required>
                    </label>
                </div>
                <div>
                    <label for="historico">
                        Histórico da Graduação: 
                    <input type="file" name="historico" id="historico" title="Histórico da Graduação" required>
                    </label>
                </div>
                <div class="toggle">
                    <label for="reservista">
                        Reservista:
                        <input type="file" name="Reservista" id="reservista" title="reservista" required>
                    </label>
                </div>
                <div>
            </fieldset>

            </div>
            <button type="submit" title="Enviar" autofocus>Enviar Pré-cadastro</button>

        </section>
    </form>
</body>

</html>
