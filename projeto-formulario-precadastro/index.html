<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Pré-cadastro Inscrição Profissional</title>
</head>

<body>
    <h3>Clique em cada botão para anexar seus documentos separadamente:</h3>
    <form action="submit">
        <div>
            <label for="rgrne">RG ou RNE: </label>
            <input type="file" name="RG/RNE" id="rgrne" title="RG/RNE" required>
        </div>
        <div>
            <label for="cpf">CPF: </label>
            <input type="file" ="Anexe cópia do CPF" name="CPF" id="cpf" title="CPF" required>
        </div>
        <div>
            <label for="cpf">Título de Eleitor: </label>
            <input type="file" name="tituloeleitor" id="rgrne" title="Título de Eleitor" required>
        </div>
        <div>
            <label for="historico">Histórico da Graduação: </label>
            <input type="file" name="historico" id="historico" title="Histórico da Graduação" required>
        </div>
        <div>
            <label for="reservista">Reservista: </label>
            <input type="file" name="Reservista" id="reservista" title="Reservista" required>
        </div>
        <button type="submit" title="Enviar">Enviar Pré-cadastro</button>

    </form>
</body>

</html>
