<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Pré-cadastro Inscrição Profissional</title>
</head>

<body>
    <h3>Clique em cada botão para anexar seus documentos separadamente:</h3>
    <form action="submit">
        <div>
            <label for="nome" title="nome">Nome: </label>
            <input type="file" name="nome" id="nome" title="nome" required>
        </div>
        <div>
            <label for="sexo" title="feminino">feminino</label>
            <input type="radio" name="feminino" id="sexo" title="feminino" required>
            <label for="sexo" title="masculino">masculino</label>
            <input type="radio" name="masculino" id="sexo" title="masculino" required>
        </div>
        <div>
            <label for="rgrne" title="RG/RNE">RG ou RNE: </label>
            <input type="file" name="RG/RNE" id="rgrne" title="RG/RNE" required>
        </div>
        <div>
            <label for="cpf" title="CPF">CPF: </label>
            <input type="file" name="CPF" id="cpf" title="CPF" required>
        </div>
        <div>
            <label for="titulo-eleitor" title="Título de Eleitor">Título de Eleitor: </label>
            <input type="file" name="titulo-eleitor" id="rgrne" title="Título de Eleitor" required>
        </div>
        <div>
            <label for="historico" title="Histórico da Graduação">Histórico da Graduação: </label>
            <input type="file" name="historico" id="historico" title="Histórico da Graduação" required>
        </div>
        <div class="toggle">
            <label for="reservista" title="reservista">Reservista: </label>
            <input type="file" name="Reservista" id="reservista" title="reservista" required>
        </div>
        <div>

        </div>
        <button type="submit" title="Enviar">Enviar Pré-cadastro</button>

    </form>
</body>

</html>
