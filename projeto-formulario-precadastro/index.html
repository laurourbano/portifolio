<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Pré-cadastro Inscrição Profissional</title>
</head>

<body>
    <h3>Clique em cada botão para anexar seus documentos separadamente:</h3>
    <form action="submit">
        <div class="container">
            <div class="wrapper">
                <button for="">Nome: </button>
                <input type="text" name="nome" id="nome" required>
            </div>
            <div>

            </div>
            <div class="wrapper">
                <legend>Selecione: </legend>
                <label for="feminino">feminino</label>
                <input type="radio" name="sexo" id="feminino" title="feminino" required>
                <label for="masculino">masculino</label>
                <input type="radio" name="sexo" id="masculino" title="masculino" required>
                <label for="naobinario">não binário</label>
                <input type="radio" name="sexo" id="naobinario" title="não binário" required checked>
            </div>
            <div class="wrapper">
                <legend>Clique no botão para anexar </legend>
                <label for="rgrne" title="RG/RNE">RG ou RNE: </label>
                <input type="file" name="RG/RNE" id="rgrne" title="RG/RNE" required>
            </div>
            <div class="wrapper">
                <legend>Clique no botão para anexar </legend>
                <label for="cpf" title="CPF">CPF: </label>
                <input type="file" name="CPF" id="cpf" title="CPF" required>
            </div>
            <div class="wrapper">
                <legend>Clique no botão para anexar </legend>
                <label for="titulo-eleitor" title="Título de Eleitor">Título de Eleitor: </label>
                <input type="file" name="titulo-eleitor" id="titulo-eleitor" title="Título de Eleitor" required>
            </div>
            <div class="wrapper">
                <legend>Clique no botão para anexar </legend>
                <label for="historico" title="Histórico da Graduação">Histórico da Graduação: </label>
                <input type="file" name="historico" id="historico" title="Histórico da Graduação" required>
            </div>
            <div class="wrapper">
                <legend>Clique no botão para anexar </legend>
                <label for="reservista" title="Reservista">Reservista: </label>
                <input type="file" name="Reservista" id="reservista" title="Reservista" required>
            </div>
            <button type="submit" title="Enviar">Enviar Pré-cadastro</button>
        </div>
    </form>
</body>

</html>
