<!DOCTYPE html>
<html>
    <body>
        <p class='msg-success'> Usuário Cadastrado com sucesso!</p>
        <script>
            setTimeout(function(){ 
                var msg = document.getElementsByClassName("msg-success");
                while(msg.length > 0){
                    msg[0].parentNode.removeChild(msg[0]);
                }
            }, 5000);
        </script>
    </body>
</html>
