<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <textarea id="textarea" rows="6" cols="40" readonly>Lorem ipsum dolor sit amet, eamsemper maiestatis no.</textarea><br/>
        
        <button id="copyBlock">Clique para copiar</button> <span id="copyAnswer"></span>
        
</body>
<script>
var textarea = document.getElementById("textarea");
var answer = document.getElementById("copyAnswer");
var copy   = document.getElementById("copyBlock");
copy.addEventListener('click', function(e) {
    textarea.select();
        try {
            var successful = document.execCommand('copy');
            if(successful) answer.innerHTML = 'Copiado!';
            else answer.innerHTML = 'Não foi possível copiar!';
        } catch (err) {
            answer.innerHTML = 'Navegador sem suporte!';
        }
});
</script>

</html>
