- FALTA DECLARAÇÃO DE BAIXA DA VIGILÂNCIA SANITÁRIA;
 - FALTA QUEBRA DE VÍNCULO DE TRABALHO; (PÁGINA DA CTPS DO CONTRATO COM DATA DE SAÍDA E ASSINATURA DA EMPRESA OU RESCISÃO/DISTRATO COM ASSINATURA DA EMPRESA E DO PROFISSIONAL);

   - FALTOU APRESENTAR A CTPS COM ANOTAÇÃO/DECLARAÇÃO DA TRANSFERÊNCIA, INDICANDO A DATA E O CNPJ PARA O QUAL FOI TRANSFERIDO (DOCUMENTO ASSINADO PELA EMPRESA);

DOCUMENTO FALTANTES:
- FALTA QUEBRA DE VÍNCULO DE TRABALHO; (PÁGINA DA CTPS DO CONTRATO COM DATA DE SAÍDA E ASSINATURA DA EMPRESA OU RESCISÃO/DISTRATO COM ASSINATURA DA EMPRESA E DO PROFISSIONAL);
 - FALTA DECLARAÇÃO DE BAIXA DA VIGILÂNCIA SANITÁRIA;
        
  - FALTOU APRESENTAR A CTPS COM ANOTAÇÃO/DECLARAÇÃO DA TRANSFERÊNCIA, INDICANDO A DATA E O CNPJ PARA O QUAL FOI TRANSFERIDO.
        
   ***PRAZO PARA APRESENTAR COMPLEMENTAÇÃO DE DOCUMENTOS – 30 DIAS (CORRIDOS) DO PROTOCOLO***
                
    ATENÇÃO. REALIZADA A BAIXA DE RESPONSABILIDADE TÉCNICA DO ESTABELECIMENTO EM CARÁTER ***PROVISÓRIO***. O PROFISSIONAL ESTÁ CIENTE DE QUE RESPONDERÁ POR TODAS AS INFORMAÇÕES PRESTADAS, E QUE NO PRAZO MÁXIMO DE 30 (TRINTA) DIAS DEVERÁ APRESENTAR OS DOCUMENTOS FALTANTES, SOB PENA DE RESPONDER A PROCESSO ÉTICO DISCIPLINAR.
        
     – PARA APRESENTAR OS DOCUMENTOS O PROFISSIONAL DEVERÁ ACESSAR O CRF EM CASA E “EM PROTOCOLOS AGUARDANDO RESPOSTA” E ANEXAR O DOCUMENTO FALTANTE.</textarea><br>

INDEFERIDO REQUERIMENTO DE BAIXA.

DOCUMENTOS SOLICITADOS PARA CORREÇÃO DO PROCEDIMENTO DE BAIXA DE RT NÃO FORAM ENVIADOS NO PRAZO DE 01 (UM) DIA ÚTIL DA RESPOSTA DO CRF-PR. 
 * DEVERÁ INICIAR NOVO REQUERIMENTO DE BAIXA DE RESPONSABILIDADE TÉCNICA, ANEXANDO TODOS OS DOCUMENTOS NECESSÁRIOS. 
  FAVOR CONSULTAR PASSO A PASSO NO LINK https://www.crf-pr.org.br/noticia/visualizar/8459
        
  DATA DA SOLICITAÇÃO – 01/01/2022.
        
MOTIVO DO INDEFERIMENTO:
– FALTOU QUEBRA DE VÍNCULO DE TRABALHO; (PÁGINA DA CTPS DO CONTRATO COM DATA DE SAÍDA E ASSINATURA DA EMPRESA OU RESCISÃO COM ASSINATURA DA EMPRESA E DO PROFISSIONAL);
 – FALTOU DECLARAÇÃO DE BAIXA DA VIGILÂNCIA SANITÁRIA;
  – FALTOU APRESENTAR A CTPS COM ANOTAÇÃO/DECLARAÇÃO DA TRANSFERÊNCIA, INDICANDO A DATA E O CNPJ PARA O QUAL FOI TRANSFERIDO; *DEVE SER EM FORMA DE DECLARAÇÃO COM PAPEL TIMBRADO OU NA CTPS. PORÉM, PARA AMBOS É OBRIGATÓRIO SER ASSINADA PELA EMPRESA*
        OU
   - CASO AINDA NÃO POSSUA TODOS OS DOCUMENTOS, PODERÁ APRESENTAR  FORMULÁRIO DE REQUERIMENTO PREENCHIDO E ASSINADO (MARCANDO TODOS OS DOCUMENTOS QUE FALTAM E O MOTIVO).</textarea><br>

 Utilizar o canal próprio para comunicado de ausência.</textarea><br>
