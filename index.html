<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset-css.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="imagem/png" href="img/meufavicon.png">
    <title>Tela de login</title>
    <script src="https://kit.fontawesome.com/abaa35b434.js" crossorigin="anonymous"></script>
</head>
<body>
    <fieldset>
        <legend><h1>Entrar</h1></legend>
        <form action="">
            <input type="text" id="email" nome="email"  placeholder="&#128231; Digite seu e-mail..."/>
            <input type="password" id="password" nome="acao" placeholder="&#128273; Digite sua senha..." />
            <input type="submit" name="action" value="Enviar" />
        </form>
        <Script>
            var email = document.getElementById("email");
            email.addEventListener("focus",()=>{
                email.style.borderColor = "DarkCyan";
            });
            var email = document.getElementById("email");
            email.addEventListener("blur",()=>{
                email.style.borderColor = "#ccc";
            });
            var password = document.getElementById("password");
            password.addEventListener("focus",()=>{
                password.style.borderColor = "DarkCyan";
            });
            var password = document.getElementById("password");
            password.addEventListener("blur",()=>{
                password.style.borderColor = "#ccc";
            });
        </Script>
    </fieldset>
</body>
</html>
